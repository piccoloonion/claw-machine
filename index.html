<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toilet Paper Claw Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  
  #top-bar {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
  }
  
  .pill {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 8px 18px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pill.credits { border-color: #ff6b81; }
  .pill.credits .val { color: #ff6b81; font-size: 20px; font-weight: 800; }
  .pill.won { border-color: #2ecc71; }
  .pill.won .val { color: #2ecc71; font-size: 20px; font-weight: 800; }
  
  #float-msg {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    font-size: 38px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 4px 12px rgba(0,0,0,0.6), 0 0 20px rgba(46,204,113,0.4);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    text-align: center;
    line-height: 1.2;
  }
  #float-msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  #grab-btn {
    position: absolute;
    bottom: 30px;
    right: 24px;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff4757, #c0392b);
    border: 3px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 8px 30px rgba(231, 76, 60, 0.6);
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #grab-btn:active {
    transform: scale(0.9);
    box-shadow: 0 3px 15px rgba(231, 76, 60, 0.4);
  }
  
  #dpad {
    position: absolute;
    bottom: 30px;
    left: 24px;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }
  
  .dpad-row { display: flex; justify-content: center; }
  .dpad-btn {
    width: 60px; height: 60px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    color: rgba(255,255,255,0.6);
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .dpad-btn:active { background: rgba(255,255,255,0.25); }
  .dpad-spacer { width: 60px; height: 60px; }

  #hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="top-bar">
    <div class="pill credits">🪙 <div class="val" id="credits-val">10</div></div>
    <div class="pill won">🧻 <div class="val" id="won-val">0</div></div>
  </div>
  <div id="float-msg"></div>
  <div id="hint">← → to move &nbsp;|&nbsp; SPACE / GRAB to drop</div>
  <div id="dpad">
    <div class="dpad-row">
      <div class="dpad-spacer"></div>
      <div class="dpad-btn" data-dir="up">▲</div>
      <div class="dpad-spacer"></div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="left">◀</div>
      <div class="dpad-spacer"></div>
      <div class="dpad-btn" data-dir="right">▶</div>
    </div>
  </div>
  <button id="grab-btn">GRAB</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ───────── Config ─────────
const MW = 8, MH = 12, MD = 5;          // machine width/height/depth
const RAIL_Y = MH / 2 - 1.5;            // rail Y position
const TP_COUNT = 24;
const SNAP_R = 1.3;
const GRIP_RATE = 0.7;

// ───────── Three.js ─────────
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Camera: front-facing, slightly angled to see depth
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 14);
camera.lookAt(0, 0, 0);

// ───────── Lighting ─────────
scene.add(new THREE.AmbientLight(0xffeedd, 1.0));
const mainLight = new THREE.DirectionalLight(0xffffff, 2);
mainLight.position.set(4, 12, 10);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 30;
mainLight.shadow.camera.left = -10;
mainLight.shadow.camera.right = 10;
mainLight.shadow.camera.top = 10;
mainLight.shadow.camera.bottom = -10;
scene.add(mainLight);

// Colorful interior fill lights
const blueFill = new THREE.PointLight(0x4488ff, 0.8, 8);
blueFill.position.set(-3, -2, 0);
scene.add(blueFill);
const pinkFill = new THREE.PointLight(0xff44aa, 0.6, 8);
pinkFill.position.set(3, -2, 0);
scene.add(pinkFill);

// ───────── Materials ─────────
const matRed = new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.5, metalness: 0.1 });
const matGold = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.3, metalness: 0.75 });
const matChrome = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.1, metalness: 0.95 });
const matSteel = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.25, metalness: 0.9 });
const matGlass = new THREE.MeshPhysicalMaterial({
  color: 0xffffff, transparent: true, opacity: 0.08,
  roughness: 0, metalness: 0, reflectivity: 1, clearcoat: 1,
  side: THREE.DoubleSide
});
const matPaper = new THREE.MeshStandardMaterial({ color: 0xfff9e6, roughness: 0.75 });
const matCardboard = new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.8 });
const matChute = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });

// ───────── Machine ─────────
const machine = new THREE.Group();
scene.add(machine);

function box(w,h,d,mat,x,y,z) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow = true; m.receiveShadow = true;
  machine.add(m); return m;
}

// Base cabinet (below playing field)
box(MW, 2.5, MD, matRed, 0, -MH/2 + 1.25, 0);
// Top cabinet
box(MW, 1, MD, matRed, 0, MH/2 - 1, 0);
// Back wall
box(MW, MH, 0.2, new THREE.MeshStandardMaterial({ color: 0x922b21 }), 0, 0, -MD/2 + 0.1);
// Side walls
for (const sx of [-1,1]) {
  box(0.2, MH, MD, matRed, sx * (MW/2 - 0.1), 0, 0);
}

// Gold trim strips
box(MW, 0.15, 0.3, matGold, 0, -1.5, MD/2 - 0.2);
box(MW, 0.15, 0.3, matGold, 0, 1.5, MD/2 - 0.2);

// Prize chute (front lower, where prizes fall out)
const chuteY = -MH/2 + 2.5;
// Chute hole on the glass
const chuteHole = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 0.8), matChute);
chuteHole.position.set(0, chuteY, MD/2 - 0.01);
machine.add(chuteHole);
// Chute opening label
const chuteLabel = document.createElement('div');
chuteLabel.style.cssText = `
  position:absolute; color:#fff; font-size:14px; font-weight:800;
  background:rgba(231,76,60,0.8); padding:4px 12px; border-radius:6px;
  transform:translateX(-50%); pointer-events:none;
`;

// Front glass panel
const glass = new THREE.Mesh(new THREE.PlaneGeometry(MW, MH - 0.5), matGlass);
glass.position.set(0, 0, MD/2 - 0.05);
machine.add(glass);

// Floor inside machine
const floorY = -MH/2 + 2.5;
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(MW - 0.5, MD - 0.5),
  new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.85 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = floorY + 0.01;
floorMesh.receiveShadow = true;
machine.add(floorMesh);

// ───────── Rail ─────────
const railMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.06, MW - 0.5, 12),
  matChrome
);
railMesh.rotation.z = Math.PI / 2;
railMesh.position.y = RAIL_Y;
machine.add(railMesh);

// ───────── Toilet Paper Rolls ─────────
const tps = [];
function createTP(x,y,z) {
  const g = new THREE.Group();
  
  // Torus = rolled paper
  const torus = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.22, 10, 20), matPaper.clone());
  torus.rotation.y = Math.PI / 2;
  torus.castShadow = true;
  g.add(torus);
  
  // Cardboard inner ring
  const core = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.42, 12), matCardboard.clone());
  core.rotation.z = Math.PI / 2;
  core.castShadow = true;
  g.add(core);
  
  g.position.set(x, y, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  g.rotation.z = (Math.random() - 0.5) * 0.4;
  scene.add(g);
  
  return {
    mesh: g, x, y, z,
    grabbed: false, won: false,
    vy: 0, vx: 0, vz: 0,
    mass: 0.5 + Math.random() * 0.3,
    drag: 0.85,
    rotSpeed: (Math.random() - 0.5) * 0.02
  };
}

const halfW = MW / 2 - 1.2;
const halfD = MD / 2 - 1.2;
for (let i = 0; i < TP_COUNT; i++) {
  const col = i % 6;
  const row = Math.floor(i / 6);
  const x = -halfW + 0.8 + col * ((halfW * 2 - 1.6) / 5);
  const y = floorY + 0.45 + row * 0.55 + (Math.random() - 0.5) * 0.05;
  const z = -halfD + 0.8 + (Math.floor(col / 3) * 1.8) + (Math.random() - 0.5) * 0.4;
  tps.push(createTP(x, y, z));
}

// ───────── Claw ─────────
const clawGroup = new THREE.Group();
scene.add(clawGroup);

// Cable
const cableGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 6);
const cableMesh = new THREE.Mesh(cableGeo, matSteel);
clawGroup.add(cableMesh);

// Hub
const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.18, 12), matChrome);
hub.castShadow = true;
clawGroup.add(hub);

// Prongs
const prongs = [];
for (let i = 0; i < 3; i++) {
  const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
  const pg = new THREE.Group();
  pg.userData.angle = angle;
  
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.7, 8), matSteel);
  arm.position.y = -0.35;
  arm.castShadow = true;
  pg.add(arm);
  
  const tip = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.035, 8, 8, Math.PI), matSteel);
  tip.position.y = -0.72;
  tip.rotation.z = Math.PI;
  tip.castShadow = true;
  pg.add(tip);
  
  clawGroup.add(pg);
  prongs.push(pg);
}

// ───────── State ─────────
let credits = 10, won = 0;
let state = 'idle';
let clawX = 0, clawY = RAIL_Y, clawZ = 0;
let clawOpen = 0.6; // 0.0=closed, 0.6=open
let grabTarget = null;
let msgTimer = 0;
let inputX = 0, inputZ = 0;

function updateUI() {
  document.getElementById('credits-val').textContent = credits;
  document.getElementById('won-val').textContent = won;
}

function showMsg(t) {
  const el = document.getElementById('float-msg');
  el.textContent = t;
  el.classList.add('show');
  msgTimer = 80;
}

// ───────── Controls ─────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inputX = -1;
  if (e.key === 'ArrowRight' || e.key === 'd') inputX = 1;
  if (e.key === 'ArrowUp' || e.key === 'w') inputZ = -1;
  if (e.key === 'ArrowDown' || e.key === 's') inputZ = 1;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); tryGrab(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') inputX = 0;
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'w' || e.key === 's') inputZ = 0;
});

document.getElementById('grab-btn').addEventListener('touchstart', e => { e.preventDefault(); tryGrab(); });
document.getElementById('grab-btn').addEventListener('click', tryGrab);

document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  btn.addEventListener('touchstart', e => { e.preventDefault();
    if (dir === 'left') inputX = -1; if (dir === 'right') inputX = 1;
    if (dir === 'up') inputZ = -1; if (dir === 'down') inputZ = 1;
  });
  btn.addEventListener('touchend', e => { e.preventDefault();
    if (dir === 'left' || dir === 'right') inputX = 0;
    if (dir === 'up' || dir === 'down') inputZ = 0;
  });
});

function tryGrab() {
  if (state === 'idle' && credits > 0) {
    credits--;
    updateUI();
    state = 'dropping';
    grabTarget = null;
  }
}

// ───────── Find Nearest TP ─────────
function findTP(cx, cy, cz) {
  let best = null, bestD = Infinity;
  for (const t of tps) {
    if (t.won) continue;
    const d = Math.sqrt((t.x - cx)**2 + (t.y - (cy + 1.2))**2 + (t.z - cz)**2);
    if (d < SNAP_R && d < bestD) { bestD = d; best = t; }
  }
  return best;
}

// ───────── Update ─────────
function update() {
  // Message timer
  if (msgTimer > 0) {
    msgTimer--;
    if (msgTimer === 0) document.getElementById('float-msg').classList.remove('show');
  }
  
  switch (state) {
    case 'idle':
      clawX = Math.max(-MW/2 + 1, Math.min(MW/2 - 1, clawX + inputX * 0.06));
      clawZ = Math.max(-MD/2 + 1.5, Math.min(MD/2 - 0.5, clawZ + inputZ * 0.035));
      clawOpen = THREE.MathUtils.clamp(clawOpen + 0.03, 0.1, 0.6);
      break;
      
    case 'dropping':
      clawY -= 0.06;
      clawOpen = THREE.MathUtils.clamp(clawOpen + 0.02, 0.1, 0.5);
      if (clawY <= floorY + 0.6) {
        grabTarget = findTP(clawX, clawY, clawZ);
        if (grabTarget && Math.random() < GRIP_RATE) {
          grabTarget.grabbed = true;
          showMsg('🎉 Got one!');
        } else {
          showMsg('💨 Missed!');
        }
        state = 'closing';
      }
      break;
      
    case 'closing':
      clawOpen = THREE.MathUtils.clamp(clawOpen - 0.04, 0, 0.6);
      if (clawOpen <= 0.01) {
        clawOpen = 0;
        // Start rise
        state = 'rising';
      }
      break;
      
    case 'rising':
      clawY += 0.055;
      if (grabTarget) {
        grabTarget.x = clawX;
        grabTarget.y = clawY + 1.0;
        grabTarget.z = clawZ;
      }
      if (clawY >= RAIL_Y) {
        clawY = RAIL_Y;
        state = 'returning';
      }
      break;
      
    case 'returning':
      clawX *= 0.92;
      clawZ = THREE.MathUtils.lerp(clawZ, 0, 0.04);
      if (grabTarget) {
        grabTarget.x = clawX;
        grabTarget.y = clawY + 1.0;
        grabTarget.z = clawZ;
      }
      if (Math.abs(clawX) < 0.08) {
        clawX = 0;
        clawZ = 0;
        if (grabTarget) {
          grabTarget.grabbed = false;
          grabTarget.vy = -0.015;
          state = 'dropping_prize';
        } else {
          state = 'idle';
        }
      }
      break;
      
    case 'dropping_prize':
      if (grabTarget) {
        grabTarget.vy -= 0.012 * grabTarget.mass;
        grabTarget.vy *= grabTarget.drag;
        grabTarget.y += grabTarget.vy;
        grabTarget.x += (clawX - grabTarget.x) * 0.05;
        grabTarget.z += (clawZ - grabTarget.z) * 0.05;
        
        if (clamp(grabTarget.y, floorY + 0.3, -1000)) {
          grabTarget.y = floorY + 0.3;
          grabTarget.vy = 0;
          if (Math.abs(clawZ) < 1.8) {
            grabTarget.won = true;
            won++;
            showMsg('🧻 Prize Collected!');
            updateUI();
          }
          grabTarget = null;
          state = 'idle';
        }
      }
      break;
  }
  
  // ── Update claw visual ──
  clawGroup.position.set(clawX, clawY, clawZ);
  const cableLen = RAIL_Y - clawY;
  cableMesh.scale.y = cableLen;
  cableMesh.position.y = -cableLen / 2;
  
  // Spread prongs based on clawOpen
  for (const p of prongs) {
    const spread = 0.2 + clawOpen * 0.45;
    p.position.x = Math.cos(p.userData.angle) * spread;
    p.position.z = Math.sin(p.userData.angle) * spread;
  }
  
  // Update TP meshes
  for (const t of tps) {
    if (!t.grabbed && !t.won) {
      t.mesh.position.set(t.x, t.y, t.z);
      t.mesh.rotation.y += t.rotSpeed;
    }
  }
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ───────── Render ─────────
function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
