<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toilet Paper Claw Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
 
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
 
  #header-logo {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    background: rgba(0, 78, 146, 0.7);
    padding: 10px 40px;
    border-radius: 12px;
    border: 3px solid #00d2ff;
    box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
  }
  #header-logo .main {
    font-size: 32px;
    font-weight: 950;
    color: #ffd800;
    text-shadow: 0 0 15px rgba(255, 216, 0, 0.6);
    letter-spacing: 2px;
    line-height:1;
  }
  #header-logo .sub {
    font-size: 11px;
    font-weight: 700;
    color: #00d2ff;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 4px;
  }


  #top-bar {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
  }
 
  .pill {
    background: rgba(0, 78, 146, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 2px solid rgba(0, 210, 255, 0.3);
    border-radius: 24px;
    padding: 10px 24px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .pill.credits { border-bottom: 4px solid #ffd800; }
  .pill.won { border-bottom: 4px solid #00d2ff; }
  .pill .val { font-size: 26px; font-weight: 950; }
  .pill.credits .val { color: #ffd800; text-shadow: 0 0 10px rgba(255,216,0,0.4); }
  .pill.won .val { color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.4); }
 
  #float-msg {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    font-size: 48px;
    font-weight: 950;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,210,255,0.6);
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    text-align: center;
    letter-spacing: -1px;
    text-transform: uppercase;
  }
  #float-msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
 
  #grab-btn {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff4757 0%, #c0392b 100%);
    border: 5px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    font-weight: 950;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 0 0 8px rgba(255, 71, 87, 0.2), 0 15px 45px rgba(231, 76, 60, 0.6);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    text-transform: uppercase;
  }
  #grab-btn:hover { transform: scale(1.05); }
  #grab-btn:active { transform: scale(0.9); background: #ff4757; }
 
  #dpad {
    position: absolute;
    bottom: 40px;
    left: 40px;
    pointer-events: auto;
    background: rgba(0, 78, 146, 0.3);
    padding: 16px;
    border-radius: 36px;
    backdrop-filter: blur(8px);
    border: 2px solid rgba(0, 210, 255, 0.2);
  }
 
  .dpad-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
  .dpad-row:last-child { margin-bottom: 0; }
  .dpad-btn {
    width: 58px; height: 58px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    color: rgba(255,255,255,0.8);
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dpad-btn:hover { background: rgba(0, 210, 255, 0.3); color: #fff; }
  .dpad-btn:active { transform: scale(0.9); background: #ffd800; color: #000; }
  .dpad-spacer { width: 58px; height: 58px; }


  #hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(0, 210, 255, 0.5);
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    pointer-events: none;
    white-space: nowrap;
  }


  @media (max-width: 600px) {
    #header-logo { top: 12px; padding: 6px 20px; }
    #header-logo .main { font-size: 24px; }
    #header-logo .sub { font-size: 9px; letter-spacing: 2px; }
   
    #top-bar { top: 85px; gap: 8px; }
    .pill { padding: 6px 14px; font-size: 14px; }
    .pill .val { font-size: 18px; }
   
    #dpad { bottom: 20px; left: 15px; padding: 10px; border-radius: 24px; }
    .dpad-btn { width: 48px; height: 48px; font-size: 18px; border-radius: 12px; }
    .dpad-spacer { width: 48px; height: 48px; }
   
    #grab-btn { bottom: 20px; right: 15px; width: 85px; height: 85px; font-size: 16px; border-width: 3px; }
    #float-msg { font-size: 32px; top: 40%; }
    #hint { font-size: 11px; bottom: 8px; opacity: 0.7; }
  }
</style>
</head>
<body>


<div id="ui">
  <div id="header-logo">
    <div class="main">TP TOWER</div>
    <div class="sub">Claw of Cleanliness</div>
  </div>
  <div id="top-bar">
    <div class="pill credits">🪙 <div class="val" id="credits-val">10</div></div>
    <div class="pill won">🧻 <div class="val" id="won-val">0</div></div>
  </div>
  <div id="float-msg"></div>
  <div id="hint">← → to move &nbsp;|&nbsp; SPACE / GRAB to drop</div>
  <div id="dpad">
    <div class="dpad-row">
      <div class="dpad-spacer"></div>
      <div class="dpad-btn" data-dir="up">▲</div>
      <div class="dpad-spacer"></div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="left">◀</div>
      <div class="dpad-spacer"></div>
      <div class="dpad-btn" data-dir="right">▶</div>
    </div>
  </div>
  <button id="grab-btn">GRAB</button>
</div>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
  }
}
</script>


<script type="module">
import * as THREE from 'three';


// ───────── Config ─────────
const MW = 8, MH = 12, MD = 5;          // machine width/height/depth
const RAIL_Y = MH / 2 - 1.5;            // rail Y position
const TP_COUNT = 64;
const SNAP_R = 1.3;
const GRIP_RATE = 0.7;


// ───────── Three.js ─────────
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);


const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;


const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);


// Camera: front-facing, slightly angled to see depth
const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, -0.6, 17);
camera.lookAt(0, -0.6, 0);


// ───────── Lighting ─────────
scene.add(new THREE.AmbientLight(0xffeedd, 1.0));
const mainLight = new THREE.DirectionalLight(0xffffff, 2);
mainLight.position.set(4, 12, 10);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 30;
mainLight.shadow.camera.left = -10;
mainLight.shadow.camera.right = 10;
mainLight.shadow.camera.top = 10;
mainLight.shadow.camera.bottom = -10;
scene.add(mainLight);


// Colorful interior fill lights
const blueFill = new THREE.PointLight(0x4488ff, 0.8, 8);
blueFill.position.set(-3, -2, 0);
scene.add(blueFill);
const pinkFill = new THREE.PointLight(0xff44aa, 0.6, 8);
pinkFill.position.set(3, -2, 0);
scene.add(pinkFill);


// ───────── Materials ─────────
const matCyan = new THREE.MeshStandardMaterial({ color: 0x00d2ff, roughness: 0.1, metalness: 0.2 });
const matYellow = new THREE.MeshStandardMaterial({ color: 0xffd800, roughness: 0.2, metalness: 0.4 });
const matHeader = new THREE.MeshStandardMaterial({ color: 0x004e92, emissive: 0x00d2ff, emissiveIntensity: 0.5 });
const matChrome = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.05, metalness: 1.0 });
const matSteel = new THREE.MeshStandardMaterial({ color: 0xbdc3c7, roughness: 0.2, metalness: 0.8 });
const matGlass = new THREE.MeshPhysicalMaterial({
  color: 0xffffff, transparent: true, opacity: 0.1,
  roughness: 0.01, metalness: 0.1, reflectivity: 1, clearcoat: 1,
  side: THREE.DoubleSide
});
const matPaper = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
const matBrand = new THREE.MeshStandardMaterial({ color: 0x3498db, roughness: 0.5 }); // Blue brand band
const matCardboard = new THREE.MeshStandardMaterial({ color: 0xc4a484, roughness: 0.8 });
const matChute = new THREE.MeshStandardMaterial({ color: 0x0a0a15, roughness: 0.4 });
const matNeonBlue = new THREE.MeshBasicMaterial({ color: 0x00d2ff });


// ───────── Machine ─────────
const machine = new THREE.Group();
scene.add(machine);


function box(w, h, d, mat, x, y, z, parent = machine) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
  parent.add(m); return m;
}


// Side Panels
box(0.15, MH, MD, matCyan, -MW/2, 0, 0);
box(0.15, MH, MD, matCyan, MW/2, 0, 0);


// Base
box(MW, 2.8, MD, matCyan, 0, -MH/2 + 1.4, 0);


// Control Panel (slanted)
const ctrlGroup = new THREE.Group();
ctrlGroup.position.set(0, -MH/2 + 3.0, MD/2 + 0.4);
ctrlGroup.rotation.x = -Math.PI / 10;
machine.add(ctrlGroup);
box(MW - 0.2, 0.4, 1.2, matYellow, 0, 0, 0, ctrlGroup);


// Header (Logo area)
box(MW + 0.2, 1.2, MD + 0.2, matHeader, 0, MH/2 - 0.5, 0);


// Back wall
box(MW, MH, 0.15, matCyan, 0, 0, -MD/2 + 0.1);


// LED vertical strips
for (const sx of [-1, 1]) {
  for (const sz of [-1, 1]) {
    const led = new THREE.Mesh(new THREE.BoxGeometry(0.06, MH - 1.2, 0.06), matNeonBlue);
    led.position.set(sx * (MW/2 - 0.12), -0.5, sz * (MD/2 - 0.1));
    machine.add(led);
  }
}


// Floor
const floorY = -MH/2 + 2.8;
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(MW - 0.3, MD - 0.3),
  new THREE.MeshStandardMaterial({ color: 0x1a1a3a, roughness: 0.8 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = floorY + 0.01;
floorMesh.receiveShadow = true;
machine.add(floorMesh);


// Front glass panel
const glass = new THREE.Mesh(new THREE.PlaneGeometry(MW - 0.2, MH - 1.5), matGlass);
glass.position.set(0, 0, MD/2 - 0.05);
machine.add(glass);


// Prize Chute Front Panel
const chuteGroup = new THREE.Group();
chuteGroup.position.set(0, -MH/2 + 1.2, MD/2 + 0.02);
machine.add(chuteGroup);
box(2.4, 1.6, 0.1, matYellow, 0, 0, 0, chuteGroup);
const chuteHoleMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.0), matChute);
chuteHoleMesh.position.set(0, 0, 0.06);
chuteGroup.add(chuteHoleMesh);


// ───────── Rail ─────────
const railMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 0.06, MW - 0.5, 12),
  matChrome
);
railMesh.rotation.z = Math.PI / 2;
railMesh.position.y = RAIL_Y;
machine.add(railMesh);

// ───────── Toilet Paper Rolls ─────────
const tps = [];
function createTP(x, y, z) {
  const g = new THREE.Group();
  
  // Outer roll
  const paper = new THREE.Mesh(
    new THREE.CylinderGeometry(0.24, 0.24, 0.44, 24),
    matPaper
  );
  paper.rotation.x = Math.PI / 2;
  paper.castShadow = true;
  g.add(paper);

  // Brand Label Strip
  const label = new THREE.Mesh(
    new THREE.CylinderGeometry(0.25, 0.25, 0.18, 24),
    matBrand
  );
  label.rotation.x = Math.PI / 2;
  label.castShadow = true;
  g.add(label);
  
  // Inner core
  const core = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 0.45, 12),
    matCardboard
  );
  core.rotation.x = Math.PI / 2;
  core.castShadow = true;
  g.add(core);

  g.position.set(x, y, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  g.rotation.x = (Math.random() - 0.5) * 0.4;
  g.rotation.z = (Math.random() - 0.5) * 0.4;
  scene.add(g);
 
  return {
    mesh: g, x, y, z,
    grabbed: false, won: false, rollingOut: false,
    vy: 0, vx: 0, vz: 0,
    mass: 0.5 + Math.random() * 0.3,
    drag: 0.92,
    rotSpeed: (Math.random() - 0.5) * 0.015
  };
}


const halfW = MW / 2 - 1.2;
const halfD = MD / 2 - 1.2;
for (let i = 0; i < TP_COUNT; i++) {
  const col = i % 6;
  const row = Math.floor(i / 6);
  // Pile them more randomly
  const x = -halfW + Math.random() * (halfW * 2);
  const y = floorY + 0.45 + (Math.random() * 2.5);
  const z = -halfD + Math.random() * (halfD * 2);
  tps.push(createTP(x, y, z));
}


// ───────── Claw ─────────
const clawGroup = new THREE.Group();
scene.add(clawGroup);


// Cable
const cableGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 6);
const cableMesh = new THREE.Mesh(cableGeo, matSteel);
clawGroup.add(cableMesh);


// Hub
const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.18, 12), matChrome);
hub.castShadow = true;
clawGroup.add(hub);


// Prongs
const prongs = [];
for (let i = 0; i < 3; i++) {
  const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
  const pg = new THREE.Group();
  pg.userData.angle = angle;
  
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.7, 8), matSteel);
  arm.position.y = -0.35;
  arm.castShadow = true;
  pg.add(arm);
  
  const tip = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.035, 8, 8, Math.PI), matSteel);
  tip.position.y = -0.72;
  tip.rotation.z = Math.PI;
  tip.castShadow = true;
  pg.add(tip);
  
  clawGroup.add(pg);
  prongs.push(pg);
}


// ───────── State ─────────
let credits = 10, won = 0;
let state = 'idle';
let clawX = 0, clawY = RAIL_Y, clawZ = 0;
let clawOpen = 0.6; // 0.0=closed, 0.6=open
let grabTarget = null;
let msgTimer = 0;
let inputX = 0, inputZ = 0;


function updateUI() {
  document.getElementById('credits-val').textContent = credits;
  document.getElementById('won-val').textContent = won;
}


function showMsg(t) {
  const el = document.getElementById('float-msg');
  el.textContent = t;
  el.classList.add('show');
  msgTimer = 80;
}


// ───────── Controls ─────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inputX = -1;
  if (e.key === 'ArrowRight' || e.key === 'd') inputX = 1;
  if (e.key === 'ArrowUp' || e.key === 'w') inputZ = -1;
  if (e.key === 'ArrowDown' || e.key === 's') inputZ = 1;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); tryGrab(); }
});

// FIXED: Added back missing || operators
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') inputX = 0;
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'w' || e.key === 's') inputZ = 0;
});


document.getElementById('grab-btn').addEventListener('touchstart', e => { e.preventDefault(); tryGrab(); });
document.getElementById('grab-btn').addEventListener('click', tryGrab);


document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  btn.addEventListener('touchstart', e => { e.preventDefault();
    if (dir === 'left') inputX = -1; if (dir === 'right') inputX = 1;
    if (dir === 'up') inputZ = -1; if (dir === 'down') inputZ = 1;
  });
  btn.addEventListener('touchend', e => { e.preventDefault();
    if (dir === 'left' || dir === 'right') inputX = 0;
    if (dir === 'up' || dir === 'down') inputZ = 0;
  });
});


function tryGrab() {
  if (state === 'idle' && credits > 0) {
    credits--;
    updateUI();
    state = 'dropping';
    grabTarget = null;
  }
}


// ───────── Find Nearest TP ─────────
function findTP(cx, cy, cz) {
  let best = null, bestD = Infinity;
  for (const t of tps) {
    if (t.won || t.grabbed) continue;
    // FIXED: Restored **2 syntax that was broken in paste
    const d = Math.sqrt((t.x - cx)**2 + (t.y - (cy - 0.8))**2 + (t.z - cz)**2);
    if (d < SNAP_R && d < bestD) { bestD = d; best = t; }
  }
  return best;
}


// ───────── Update ─────────
function update() {
  // Message timer
  if (msgTimer > 0) {
    msgTimer--;
    if (msgTimer === 0) document.getElementById('float-msg').classList.remove('show');
  }
  
  switch (state) {
    case 'idle':
      clawX = Math.max(-MW/2 + 1, Math.min(MW/2 - 1, clawX + inputX * 0.06));
      clawZ = Math.max(-MD/2 + 1.5, Math.min(MD/2 - 0.5, clawZ + inputZ * 0.035));
      clawOpen = THREE.MathUtils.clamp(clawOpen + 0.03, 0.1, 0.6);
      break;
      
    case 'dropping':
      clawY -= 0.06;
      clawOpen = THREE.MathUtils.clamp(clawOpen + 0.02, 0.1, 0.5);
      if (clawY <= floorY + 0.6) {
        let potential = findTP(clawX, clawY, clawZ);
        if (potential && Math.random() < GRIP_RATE) {
          grabTarget = potential;
          grabTarget.grabbed = true;
          showMsg('🎉 Got one!');
        } else {
          grabTarget = null;
          showMsg('💨 Missed!');
        }
        state = 'closing';
      }
      break;
      
    case 'closing':
      clawOpen = THREE.MathUtils.clamp(clawOpen - 0.04, 0, 0.6);
      if (clawOpen <= 0.01) {
        clawOpen = 0;
        state = 'rising';
      }
      break;
      
    case 'rising':
      clawY += 0.055;
      if (grabTarget && grabTarget.grabbed) {
        grabTarget.x = clawX;
        grabTarget.y = clawY - 0.8;
        grabTarget.z = clawZ;
      }
      if (clawY >= RAIL_Y) {
        clawY = RAIL_Y;
        state = 'returning';
      }
      break;
      
    case 'returning':
      clawX *= 0.94;
      clawZ = THREE.MathUtils.lerp(clawZ, 1.8, 0.06);
      if (grabTarget && grabTarget.grabbed) {
        grabTarget.x = clawX;
        grabTarget.y = clawY - 0.8;
        grabTarget.z = clawZ;
      }
      if (Math.abs(clawX) < 0.08 && Math.abs(clawZ - 1.8) < 0.08) {
        clawX = 0;
        clawZ = 1.8;
        if (grabTarget) {
          grabTarget.grabbed = false;
          grabTarget.vy = -0.015;
          state = 'dropping_prize';
        } else {
          state = 'idle';
        }
      }
      break;
      
    case 'dropping_prize':
      if (grabTarget) {
        grabTarget.vy -= 0.012 * grabTarget.mass;
        grabTarget.vy *= grabTarget.drag;
        grabTarget.y += grabTarget.vy;
        grabTarget.x += (clawX - grabTarget.x) * 0.05;
        grabTarget.z += (clawZ - grabTarget.z) * 0.05;
        
        if (grabTarget.y <= floorY + 0.3) {
          const inBin = Math.abs(grabTarget.x) < 1.3 && grabTarget.z > 1.3;
          if (inBin) {
             if (grabTarget.y > floorY - 0.8) {
                grabTarget.y -= 0.12;
             } else {
                grabTarget.rollingOut = true;
                grabTarget.vx = 0;
                grabTarget.vy = -0.05;
                grabTarget.vz = 0.15;
                won++;
                updateUI();
                showMsg('🎉 Prize Collected!');
                grabTarget = null;
                state = 'idle';
             }
          } else {
             grabTarget.y = floorY + 0.45;
             grabTarget.vy = 0;
             grabTarget = null;
             state = 'idle';
          }
        }
      }
      break;
  }
  
  // ── Update claw visual ──
  clawGroup.position.set(clawX, clawY, clawZ);
  const cableLen = RAIL_Y - clawY;
  cableMesh.scale.y = cableLen;
  cableMesh.position.y = -cableLen / 2;
  
  // Spread prongs based on clawOpen
  for (const p of prongs) {
    const spread = 0.2 + clawOpen * 0.45;
    p.position.x = Math.cos(p.userData.angle) * spread;
    p.position.z = Math.sin(p.userData.angle) * spread;
  }
  
  // Update TP meshes
  for (const t of tps) {
    if (t.won) {
      t.mesh.visible = false;
      continue;
    }
    if (t.rollingOut) {
      t.y += t.vy;
      t.z += t.vz;
      t.mesh.rotation.x += 0.2;
      t.mesh.position.set(t.x, t.y, t.z);
      if (t.z > 6) {
        t.won = true;
        t.rollingOut = false;
      }
    } else {
      if (t.grabbed) { t.mesh.rotation.z = Math.sin(Date.now() * 0.01) * 0.1; }
      t.mesh.position.set(t.x, t.y, t.z);
      t.mesh.rotation.y += t.rotSpeed;
    }
  }
}


// ───────── Render ─────────
function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
animate();


window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
