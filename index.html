<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Toilet Paper Claw Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    userSelect: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  
  #score-panel {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
  }
  
  .badge {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 16px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  
  .badge.credits { border-color: #e74c3c; }
  .badge.credits span { color: #e74c3c; font-size: 18px; }
  .badge.won { border-color: #2ecc71; }
  .badge.won span { color: #2ecc71; }
  
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  #message.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
  }

  #controls-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
  }
  
  #grab-btn {
    position: absolute;
    bottom: 80px;
    right: 30px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff4757, #c0392b);
    border: 3px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 6px 25px rgba(231, 76, 60, 0.5);
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #grab-btn:active {
    transform: scale(0.9);
    box-shadow: 0 3px 15px rgba(231, 76, 60, 0.4);
  }
  
  #left-pad {
    position: absolute;
    bottom: 60px;
    left: 30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
  }
  #left-pad::after {
    content: '◀ ▶';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.3);
    font-size: 18px;
    letter-spacing: 6px;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="score-panel">
    <div class="badge credits">Credits: <span id="credits-val">10</span></div>
    <div class="badge won">Won: <span id="won-val">0</span></div>
  </div>
  <div id="message"></div>
  <div id="controls-hint">← → to move  |  SPACE or tap button to grab</div>
  <div id="left-pad"></div>
  <button id="grab-btn">GRAB</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── Config ──
const CLAW_SPEED = 0.06;
const DROP_SPEED = 0.04;
const RISE_SPEED = 0.045;
const RETURN_SPEED = 0.04;
const SNAP_RADIUS = 1.2;
const GRIP_CHANCE = 0.7;
const MACHINE_W = 10;
const MACHINE_H = 12;
const MACHINE_D = 6;
const TOILET_PAPER_COUNT = 18;

// ── State ──
let credits = 10;
let wonCount = 0;
let gameState = 'idle'; // idle | dropping | grabbing | rising | returning | dropping_prize | win
let clawX = 0;
let clawY = MACHINE_H / 2 - 1;
let clawZ = 0;
let clawAngle = 0.6; // how open the claw is (0=closed, 0.6=open)
let grabbedTP = null;
let messageTimer = 0;

// ── Three.js Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog = new THREE.Fog(0x111122, 20, 35);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 10, 12);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── Lighting ──
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
mainLight.position.set(5, 15, 8);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.near = 1;
mainLight.shadow.camera.far = 30;
mainLight.shadow.camera.left = -10;
mainLight.shadow.camera.right = 10;
mainLight.shadow.camera.top = 10;
mainLight.shadow.camera.bottom = -10;
scene.add(mainLight);

// Neon accent lights inside the machine
const neonBlue = new THREE.PointLight(0x4169E1, 2, 10);
neonBlue.position.set(-3, 0, 0);
scene.add(neonBlue);

const neonPink = new THREE.PointLight(0xFF1493, 1.5, 10);
neonPink.position.set(3, 0, 0);
scene.add(neonPink);

// ── Materials ──
const metalMat = new THREE.MeshStandardMaterial({ 
  color: 0x888888, metalness: 0.9, roughness: 0.2 
});
const chromeMat = new THREE.MeshStandardMaterial({ 
  color: 0xffffff, metalness: 1, roughness: 0.15 
});
const redMat = new THREE.MeshStandardMaterial({ 
  color: 0xE74C3C, metalness: 0.3, roughness: 0.5 
});
const goldMat = new THREE.MeshStandardMaterial({ 
  color: 0xFFD700, metalness: 0.8, roughness: 0.3 
});
const glassMat = new THREE.MeshPhysicalMaterial({ 
  color: 0xffffff, metalness: 0, roughness: 0,
  transmission: 0.95, transparent: true, opacity: 0.25,
  ior: 1.5, thickness: 0.5
});
const tpPaperMat = new THREE.MeshStandardMaterial({ 
  color: 0xFFFEF5, roughness: 0.8, metalness: 0 
});
const tpCardboardMat = new THREE.MeshStandardMaterial({ 
  color: 0xD2B48C, roughness: 0.9, metalness: 0 
});

// ── Machine Body ──
const machineGroup = new THREE.Group();
scene.add(machineGroup);

// Base cabinet
const baseGeo = new THREE.BoxGeometry(MACHINE_W, 2, MACHINE_D);
const base = new THREE.Mesh(baseGeo, redMat.clone());
base.position.y = -MACHINE_H / 2 + 1;
base.castShadow = true;
base.receiveShadow = true;
machineGroup.add(base);

// Top cabinet
const topGeo = new THREE.BoxGeometry(MACHINE_W, 1, MACHINE_D);
const top = new THREE.Mesh(topGeo, redMat.clone());
top.position.y = MACHINE_H / 2 - 0.5;
top.castShadow = true;
machineGroup.add(top);

// Pillars
function makePillar(x, z) {
  const geo = new THREE.BoxGeometry(0.3, MACHINE_H, 0.3);
  const m = new THREE.Mesh(geo, goldMat.clone());
  m.position.set(x, 0, z);
  m.castShadow = true;
  machineGroup.add(m);
}
makePillar(-MACHINE_W/2, -MACHINE_D/2);
makePillar(MACHINE_W/2, -MACHINE_D/2);
makePillar(-MACHINE_W/2, MACHINE_D/2);
makePillar(MACHINE_W/2, MACHINE_D/2);

// Back wall
const backGeo = new THREE.PlaneGeometry(MACHINE_W, MACHINE_H);
const backWallMat = new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.6 });
const backWall = new THREE.Mesh(backGeo, backWallMat);
backWall.position.set(0, 0, -MACHINE_D/2 + 0.1);
backWall.receiveShadow = true;
machineGroup.add(backWall);

// Side walls
const sideGeo = new THREE.PlaneGeometry(MACHINE_D, MACHINE_H);
for (const x of [-MACHINE_W/2, MACHINE_W/2]) {
  const side = new THREE.Mesh(sideGeo, redMat.clone());
  side.position.set(x, 0, 0);
  side.rotation.y = Math.PI / 2;
  side.receiveShadow = true;
  machineGroup.add(side);
}

// Front glass
const glassGeo = new THREE.PlaneGeometry(MACHINE_W, MACHINE_H);
const glass = new THREE.Mesh(glassGeo, glassMat);
glass.position.set(0, 0, MACHINE_D/2 - 0.1);
machineGroup.add(glass);

// Prize chute opening
const chuteGeo = new THREE.BoxGeometry(3, 0.8, 0.5);
const chuteMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
const chute = new THREE.Mesh(chuteGeo, chuteMat);
chute.position.set(0, -MACHINE_H/2 + 3.5, MACHINE_D/2 - 0.3);
machineGroup.add(chute);

// ── Rail ──
const railGeo = new THREE.CylinderGeometry(0.1, 0.1, MACHINE_W, 12);
const rail = new THREE.Mesh(railGeo, chromeMat.clone());
rail.rotation.z = Math.PI / 2;
rail.position.y = MACHINE_H / 2 - 1.5;
machineGroup.add(rail);

// ── Toilet Paper Rolls ──
const toiletPapers = [];

function createTP(x, y, z) {
  const group = new THREE.Group();
  
  // Roll body (torus + cylinder combo)
  const outerGeo = new THREE.TorusGeometry(0.35, 0.3, 12, 20);
  const outer = new THREE.Mesh(outerGeo, tpPaperMat.clone());
  outer.rotation.y = Math.PI / 2;
  outer.castShadow = true;
  group.add(outer);
  
  // Cardboard core
  const coreGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.55, 12);
  const core = new THREE.Mesh(coreGeo, tpCardboardMat.clone());
  core.rotation.z = Math.PI / 2;
  core.castShadow = true;
  group.add(core);
  
  // Slight random rotation for natural look
  group.rotation.y = Math.random() * Math.PI * 2;
  group.rotation.z = (Math.random() - 0.5) * 0.3;
  
  group.position.set(x, y, z);
  scene.add(group);
  
  return {
    mesh: group,
    x, y, z,
    grabbed: false,
    vy: 0,
    vx: 0,
    vz: 0,
    mass: 0.3 + Math.random() * 0.2,
    drag: 0.92,
    won: false
  };
}

function spawnTP() {
  const halfW = MACHINE_W / 2 - 1.2;
  const halfD = MACHINE_D / 2 - 1.2;
  const floorY = -MACHINE_H / 2 + 2.5;
  
  for (let i = 0; i < TOILET_PAPER_COUNT; i++) {
    const row = Math.floor(i / 5);
    const col = i % 5;
    const x = -halfW + (col + 0.5) * (halfW * 2 / 5);
    const y = floorY + row * 0.7 + (Math.random() - 0.5) * 0.15;
    const z = -halfD + 1 + (Math.floor(col / 3)) * 2 + (Math.random() - 0.5) * 0.5;
    toiletPapers.push(createTP(x, y, z));
  }
}
spawnTP();

// ── Claw ──
const clawGroup = new THREE.Group();
scene.add(clawGroup);

// Cable
const cableGeo = new THREE.CylinderGeometry(0.04, 0.04, 2, 6);
const cable = new THREE.Mesh(cableGeo, metalMat);
cable.castShadow = true;
clawGroup.add(cable);

// Claw hub
const hubGeo = new THREE.CylinderGeometry(0.3, 0.25, 0.2, 12);
const hub = new THREE.Mesh(hubGeo, chromeMat);
hub.position.y = -1;
hub.castShadow = true;
clawGroup.add(hub);

// Prongs (3 claws)
const prongs = [];
function makeProng(index) {
  const angle = (index / 3) * Math.PI * 2;
  const prongGroup = new THREE.Group();
  
  // Arm
  const armGeo = new THREE.CylinderGeometry(0.06, 0.05, 0.8, 8);
  const arm = new THREE.Mesh(armGeo, metalMat);
  arm.position.y = -0.4;
  arm.castShadow = true;
  prongGroup.add(arm);
  
  // Tip (curved)
  const tipGeo = new THREE.TorusGeometry(0.15, 0.04, 8, 8, Math.PI);
  const tip = new THREE.Mesh(tipGeo, metalMat);
  tip.position.set(0, -0.85, 0);
  tip.rotation.z = Math.PI;
  tip.castShadow = true;
  prongGroup.add(tip);
  
  prongGroup.position.set(Math.cos(angle) * 0.25, -1, Math.sin(angle) * 0.25);
  prongGroup.rotation.x = 0.3;
  prongGroup.userData.baseAngle = 0.3;
  prongGroup.userData.angle = angle;
  clawGroup.add(prongGroup);
  prongs.push(prongGroup);
}
makeProng(0);
makeProng(1);
makeProng(2);

clawGroup.position.set(0, clawY, 0);

// ── Shadow floor ──
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -8;
floor.receiveShadow = true;
scene.add(floor);

// ── Stars (background particles) ──
const starGeo = new THREE.BufferGeometry();
const starCount = 200;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random() - 0.5) * 40;
  starPos[i*3+1] = Math.random() * 20 - 5;
  starPos[i*3+2] = -10 - Math.random() * 15;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ── Controls ──
let inputX = 0;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inputX = -1;
  if (e.key === 'ArrowRight' || e.key === 'd') inputX = 1;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); handleGrab(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'a' || e.key === 'd') inputX = 0;
});

// Touch: left pad
const leftPad = document.getElementById('left-pad');
leftPad.addEventListener('touchstart', (e) => { e.preventDefault(); });
leftPad.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = leftPad.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const dx = touch.clientX - cx;
  inputX = dx > 15 ? 1 : dx < -15 ? -1 : 0;
});
leftPad.addEventListener('touchend', () => { inputX = 0; });

// Touch: grab button
document.getElementById('grab-btn').addEventListener('touchstart', (e) => { e.preventDefault(); handleGrab(); });
document.getElementById('grab-btn').addEventListener('click', handleGrab);

function handleGrab() {
  if (gameState === 'idle' && credits > 0) {
    credits--;
    updateUI();
    gameState = 'dropping';
    clawAngle = 0.6;
    grabbedTP = null;
  }
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.classList.add('show');
  messageTimer = 90;
}

function updateUI() {
  document.getElementById('credits-val').textContent = credits;
  document.getElementById('won-val').textContent = wonCount;
}

// ── Find nearest TP ──
function findNearestTP(cx, cy, cz) {
  let nearest = null;
  let minDist = Infinity;
  for (const tp of toiletPapers) {
    if (tp.won) continue;
    const dx = tp.x - cx;
    const dy = tp.y - (cy + 1.5);
    const dz = tp.z - cz;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (dist < SNAP_RADIUS && dist < minDist) {
      minDist = dist;
      nearest = tp;
    }
  }
  return nearest;
}

// ── Update ──
const clock = new THREE.Clock();

function update() {
  if (messageTimer > 0) {
    messageTimer--;
    if (messageTimer === 0) {
      document.getElementById('message').classList.remove('show');
    }
  }

  switch (gameState) {
    case 'idle':
      clawX += inputX * CLAW_SPEED;
      clawX = Math.max(-MACHINE_W/2 + 1, Math.min(MACHINE_W/2 - 1, clawX));
      clawZ += inputX * CLAW_SPEED * 0.3; // slight depth movement
      clawZ = Math.max(-MACHINE_D/2 + 1.5, Math.min(MACHINE_D/2 - 1, clawZ));
      clawAngle = 0.6;
      break;

    case 'dropping':
      clawY -= DROP_SPEED;
      if (clawY <= -MACHINE_H/2 + 3) {
        grabbedTP = findNearestTP(clawX, clawY, clawZ);
        if (grabbedTP && Math.random() < GRIP_CHANCE) {
          grabbedTP.grabbed = true;
          showMessage('🎉 Got it!');
        } else {
          grabTP = null;
          showMessage('💨 Slipped!');
        }
        gameState = 'grabbing';
      }
      break;

    case 'grabbing':
      if (clawAngle > 0) {
        clawAngle -= 0.02;
      } else {
        clawAngle = 0;
        clawY = -MACHINE_H/2 + 3;
        gameState = 'rising';
      }
      break;

    case 'rising':
      clawY += RISE_SPEED;
      if (grabbedTP) {
        grabbedTP.x = clawX;
        grabbedTP.y = clawY + 1.2;
        grabbedTP.z = clawZ;
      }
      if (clawY >= MACHINE_H/2 - 1.5) {
        clawY = MACHINE_H/2 - 1.5;
        gameState = 'returning';
      }
      break;

    case 'returning':
      // Move claw back to center
      clawX *= 0.95;
      clawZ *= 0.95;
      if (grabbedTP) {
        grabbedTP.x = clawX;
        grabbedTP.y = clawY + 1.2;
        grabbedTP.z = clawZ;
      }
      if (Math.abs(clawX) < 0.1) {
        clawX = 0;
        clawZ = 0;
        if (grabbedTP) {
          grabbedTP.grabbed = false;
          grabbedTP.vy = -0.02;
          gameState = 'dropping_prize';
        } else {
          showMessage('Missed!');
          gameState = 'idle';
        }
      }
      break;

    case 'dropping_prize':
      if (grabbedTP) {
        grabbedTP.vy -= 0.015 * grabbedTP.mass;
        grabbedTP.vy *= grabbedTP.drag;
        grabbedTP.y += grabbedTP.vy;
        
        if (grabbedTP.y <= -MACHINE_H/2 + 2.2) {
          grabbedTP.y = -MACHINE_H/2 + 2.2;
          grabbedTP.vy = 0;
          grabbedTP.vy *= -0.3; // slight bounce
          
          if (Math.abs(grabbedTP.vy) < 0.005) {
            grabbedTP.vy = 0;
            if (Math.abs(clawZ) < 1.8) {
              grabbedTP.won = true;
              wonCount++;
              showMessage('🧻 Prize Collected!');
              updateUI();
            }
            grabbedTP = null;
            gameState = 'idle';
          }
        }
      }
      break;
  }

  // Update claw visual
  clawGroup.position.x = clawX;
  clawGroup.position.y = clawY;
  clawGroup.position.z = clawZ;
  
  // Update cable length
  const cableLen = MACHINE_H/2 - 1.5 - clawY;
  cable.scale.y = cableLen;
  cable.position.y = -cableLen / 2 - 1;
  
  // Animate prongs opening/closing
  for (const prong of prongs) {
    const spread = clawAngle;
    prong.position.x = Math.cos(prong.userData.angle) * (0.25 + spread * 0.5);
    prong.position.z = Math.sin(prong.userData.angle) * (0.25 + spread * 0.5);
  }
  
  // Update TP positions
  for (const tp of toiletPapers) {
    if (!tp.grabbed && !tp.won) {
      tp.mesh.position.set(tp.x, tp.y, tp.z);
      tp.mesh.rotation.y += 0.005;
    }
  }
  
  // Animate neon lights
  const t = clock.getElapsedTime();
  neonBlue.intensity = 1.5 + Math.sin(t * 2) * 0.5;
  neonPink.intensity = 1 + Math.sin(t * 3 + 1) * 0.5;
  stars.rotation.y += 0.0002;
  
  updateUI();
}

// ── Render Loop ──
function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
